<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Details Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background: #f8f9fa; }
      .card { max-width: 720px; margin: 2.5rem auto; }
    </style>
  </head>
  <body>
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Personal Details</h4>
        <form id="personalForm" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="firstName" class="form-label">First name</label>
              <input type="text" class="form-control" id="firstName" placeholder="John" required>
              <div class="invalid-feedback">Please enter your first name.</div>
            </div>
            <div class="col-md-6">
              <label for="lastName" class="form-label">Last name</label>
              <input type="text" class="form-control" id="lastName" placeholder="Doe" required>
              <div class="invalid-feedback">Please enter your last name.</div>
            </div>
            <div class="col-md-6">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
              <div class="invalid-feedback">Please provide a valid email.</div>
            </div>
            <div class="col-md-6">
              <label for="phone" class="form-label">Phone</label>
              <input type="tel" class="form-control" id="phone" placeholder="+1 555 555 5555">
            </div>
            <div class="col-md-4">
              <label for="dob" class="form-label">Date of birth</label>
              <input type="date" class="form-control" id="dob">
            </div>
            <div class="col-md-4">
              <label class="form-label d-block">Gender</label>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="genderMale" value="male">
                <label class="form-check-label" for="genderMale">Male</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="female">
                <label class="form-check-label" for="genderFemale">Female</label>
              </div>
            </div>
            <div class="col-12">
              <label for="address" class="form-label">Address</label>
              <textarea class="form-control" id="address" rows="3" placeholder="Street, City, Country"></textarea>
            </div>
            <div class="col-12 text-end">
              <button type="reset" class="btn btn-outline-secondary me-2">Reset</button>
              <button type="submit" class="btn btn-primary">Submit</button>
            </div>
          </div>
        </form>
        <div id="result" class="mt-3"></div>
      </div>
    </div>

    <script>
      // Simple Bootstrap validation + display submitted values
      (function () {
        const form = document.getElementById('personalForm');
        const result = document.getElementById('result');
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          if (!form.checkValidity()) {
            form.classList.add('was-validated');
            return;
          }
          const data = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            dob: document.getElementById('dob').value,
            gender: document.querySelector('input[name="gender"]:checked')?.value || '',
            address: document.getElementById('address').value,
          };
          result.innerHTML = `\n            <div class="alert alert-success" role="alert">\n              Submitted: <strong>${data.firstName} ${data.lastName}</strong> — ${data.email}\n            </div>`;
          form.reset();
          form.classList.remove('was-validated');
        });
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
